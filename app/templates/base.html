<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}DUS Koçluk{% endblock %}</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; color: #1e293b; }
  nav { background: #1e40af; color: white; padding: 0 24px; display: flex; align-items: center; gap: 20px; height: 56px; }
  nav a { color: white; text-decoration: none; font-size: 14px; opacity: .85; }
  nav a:hover { opacity: 1; }
  nav .brand { font-weight: 700; font-size: 17px; opacity: 1; margin-right: 12px; }
  .container { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }
  .card { background: white; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); padding: 24px; margin-bottom: 20px; }
  .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #374151; }
  .btn { display: inline-block; padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; text-decoration: none; }
  .btn-primary { background: #1e40af; color: white; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-sm { padding: 5px 12px; font-size: 13px; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-green { background: #dcfce7; color: #166534; }
  .badge-yellow { background: #fef9c3; color: #854d0e; }
  .badge-red { background: #fee2e2; color: #991b1b; }
  .badge-blue { background: #dbeafe; color: #1e40af; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
  @media(max-width: 700px) { .grid2, .grid3 { grid-template-columns: 1fr; } }
  .stat-box { text-align: center; padding: 16px; }
  .stat-box .value { font-size: 32px; font-weight: 700; color: #1e40af; }
  .stat-box .label { font-size: 13px; color: #6b7280; margin-top: 4px; }
  .progress-bar { background: #e5e7eb; border-radius: 8px; height: 8px; overflow: hidden; }
  .progress-bar .fill { height: 100%; border-radius: 8px; background: #1e40af; transition: width .3s; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 10px 12px; border-bottom: 2px solid #e5e7eb; color: #6b7280; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
  td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafc; }
  select, input, textarea { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; font-family: inherit; }
  select:focus, input:focus, textarea:focus { outline: none; border-color: #1e40af; box-shadow: 0 0 0 3px rgba(30,64,175,.1); }
  label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 4px; }
  .form-group { margin-bottom: 16px; }
  .tag { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 12px; background: #f1f5f9; color: #475569; margin: 2px; }
</style>
{% block head %}{% endblock %}
</head>
<body>
<nav>
  <a href="/" class="brand">🦷 DUS Koçluk</a>
  <a href="/">Öğrenciler</a>
  <a href="/admin">Admin Panel</a>
  <a href="/student/new" style="margin-left:auto;">+ Yeni Öğrenci</a>
</nav>
<div class="container">
{% block content %}{% endblock %}
</div>
</body>
</html>
